<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=no">
    <title>ESP32 Sensors</title>

    <link rel="stylesheet" href="/webpage/style.css">
  </head>

  <script src="/webpage/script.js"></script>
  <script src="/websockets/websockets.js"></script>

  <body>
    <div class="title-container">
      <h1 class="title">ESP32 Sensors</h1>
    </div>

    <div class="content-container">
      <div class="box" id="box-sensors">
        <div class="box-title">
          <h3>Sensor Data</h3>
        </div>
        <div class="content">
          <!-- Temperature display -->
          <div class="input-label" style="font-size: 1.2em; margin-bottom: 10px;">
            Temperature: <span id="temp-display" style="font-weight: bold; color: #e74c3c;">--</span> &deg;C
          </div>
          <!-- Humidity display -->
          <div class="input-label" style="font-size: 1.2em;">
            Humidity: <span id="hum-display" style="font-weight: bold; color: #3498db;">--</span> %
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
